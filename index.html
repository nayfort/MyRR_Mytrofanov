<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Racing Catalog</title>
  <link rel="stylesheet" href="styles/main.css">

</head>
<body>
  <header class="hero">
    <h1>Racing Catalog</h1>
    <p>Каталог гоночних команд і болідів.</p>

      <h2>Галерея</h2>
      <img src="images/red-car.png" alt="Red racing car">
      <img src="images/track.png" alt="Night racing track">
    </section>
    <section class="panel">
      <h2>Стилізована сторінка</h2>
      <p>Гілка styles додає CSS-файли та оформлення головної сторінки.</p>
    </section>
                <section class="gallery gallery-secondary">
              <h2>Додаткова галерея</h2>
              <img src="images/blue-car.png" alt="Blue racing car">
              <img src="images/pit-lane.png" alt="Pit lane">
            </section>
            <!-- extension-point -->
  </main>

</html>
